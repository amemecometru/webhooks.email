# =============================================================================
#  webhooks.email — GitHub Action Webhook Notifier
#  Copy this file to .github/workflows/webhook-notify.yml in your repo.
#  Set WEBHOOK_URL as a repository secret.
# =============================================================================
name: Notify webhooks.email

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send webhook
        run: |
          curl -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "github.${{ github.event_name }}",
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "action": "${{ github.action }}",
              "workflow": "${{ github.workflow }}",
              "status": "${{ job.status }}"
            }'
